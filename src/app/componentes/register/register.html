<div class="register-wrapper">
  <div class="register-card">
    <h2>Crear Cuenta</h2>
    <p>Completá tus datos para empezar</p>
    
    <div class="form-group">
      <input type="text" placeholder="Username" [(ngModel)]="nombre">
    </div>
    
    <div class="form-group">
      <input type="password" placeholder="Contraseña" [(ngModel)]="contrasenia">
    </div>

    <div class="form-group">
      <input type="password" placeholder="Confirmar contraseña" [(ngModel)]="confirmPassword">
    </div>
    
    <button class="btn-register" (click)="register()">Registrarse</button>

    <div class="footer-link">
      ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </div>

    <div class="error-message" *ngIf="error">
      <p>{{error}}</p>
    </div>
  </div>
</div>
